<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Cờ Caro ⭕❌</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&display=swap" rel="stylesheet">
<style>
:root{--nen:#FFF8EC;--do:#FF5A5F;--xanh:#2EA8E0;--vang:#FFC93C;--muc:#3A2E39;--trang:#fff;--xam:#EDE4D3;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;}
body{font-family:'Baloo 2',system-ui,sans-serif;background:var(--nen);color:var(--muc);min-height:100vh;min-height:100dvh;}
#nutHome{position:fixed;top:10px;left:10px;z-index:9999;width:44px;height:44px;border-radius:50%;background:var(--trang);border:3px solid var(--muc);box-shadow:0 3px 0 var(--muc);display:flex;align-items:center;justify-content:center;font-size:22px;text-decoration:none;}
.man{display:none;max-width:560px;margin:0 auto;padding:16px;}
.man.hien{display:block;}
.logo{text-align:center;font-size:32px;font-weight:800;margin:24px 0 4px;}
.logo span{color:var(--do);}
.phude{text-align:center;margin:0 0 24px;font-size:16px;opacity:.75;}
.the-hop{background:var(--trang);border:3px solid var(--muc);border-radius:22px;box-shadow:0 6px 0 var(--muc);padding:18px;margin:0 auto 16px;max-width:420px;}
.the-hop h2{margin:0 0 10px;font-size:19px;}
input[type=text]{width:100%;font-family:inherit;font-size:18px;font-weight:700;padding:12px 14px;border:3px solid var(--muc);border-radius:14px;background:var(--nen);color:var(--muc);text-transform:uppercase;outline:none;}
.nut{display:block;width:100%;font-family:inherit;font-size:18px;font-weight:800;padding:13px;margin-top:12px;border:3px solid var(--muc);border-radius:16px;background:var(--vang);color:var(--muc);cursor:pointer;box-shadow:0 4px 0 var(--muc);transition:transform .05s;}
.nut:active{transform:translateY(3px);box-shadow:0 1px 0 var(--muc);}
.nut.do{background:var(--do);color:#fff;}.nut.xanh{background:var(--xanh);color:#fff;}
.nut.nho{width:auto;display:inline-block;font-size:15px;padding:8px 16px;margin-top:0;}
.ma-phong{font-size:52px;font-weight:800;letter-spacing:10px;text-align:center;background:var(--trang);border:3px dashed var(--do);border-radius:18px;padding:14px;margin:14px 0;}
.cho-doi{text-align:center;font-size:17px;}
.cham{display:inline-block;animation:nhay 1.2s infinite;}
.cham:nth-child(2){animation-delay:.2s;}.cham:nth-child(3){animation-delay:.4s;}
@keyframes nhay{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.thanh-tren{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px;}
.luot{font-size:16px;font-weight:800;padding:8px 16px;border-radius:999px;border:3px solid var(--muc);background:var(--xam);}
.luot.toi{background:var(--vang);}
.bang{display:grid;gap:0;background:var(--muc);border:4px solid var(--muc);border-radius:12px;overflow:hidden;box-shadow:0 6px 0 var(--muc);touch-action:manipulation;}
.o{aspect-ratio:1;background:var(--trang);border:1px solid #d8cdb8;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;}
.o::after{content:"";width:64%;height:64%;border-radius:50%;transform:scale(0);transition:transform .12s;}
.o.H::after{background:var(--do);transform:scale(1);}
.o.G::after{background:var(--xanh);transform:scale(1);}
.o.moi{box-shadow:inset 0 0 0 3px var(--vang);}
.o.thang{background:#FFF3B0;}
.banner{background:var(--trang);border:3px solid var(--muc);border-radius:18px;box-shadow:0 5px 0 var(--muc);padding:16px;text-align:center;margin-top:14px;}
.banner h2{margin:0 0 12px;font-size:24px;}
.thongbao{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);background:var(--muc);color:#fff;font-size:15px;font-weight:700;padding:10px 20px;border-radius:999px;opacity:0;pointer-events:none;transition:opacity .3s;z-index:99;}
.thongbao.hien{opacity:1;}
.chu-thich{text-align:center;font-size:14px;margin-top:10px;opacity:.75;}
.vien-do{color:var(--do);font-weight:800;}.vien-xanh{color:var(--xanh);font-weight:800;}
</style>
</head>
<body>
<a href="index.html" id="nutHome" onclick="veMenu(event)" title="Về menu">🏠</a>

<div class="man hien" id="manChu">
  <h1 class="logo">⭕❌ Cờ <span>Caro</span></h1>
  <p class="phude">Ai nối được <b>5 ô</b> thẳng hàng trước sẽ thắng!</p>
  <div class="the-hop">
    <h2>Tên của bạn</h2>
    <input type="text" id="oTen" maxlength="12" placeholder="VD: BỐ, MẸ, TÍ...">
  </div>
  <div class="the-hop">
    <h2>🏠 Tạo phòng mới</h2>
    <button class="nut do" onclick="taoPhong()">Tạo phòng</button>
  </div>
  <div class="the-hop">
    <h2>🔑 Vào phòng có sẵn</h2>
    <input type="text" id="oMa" maxlength="4" placeholder="NHẬP MÃ 4 CHỮ">
    <button class="nut xanh" onclick="vaoPhong()">Vào phòng</button>
  </div>
</div>

<div class="man" id="manCho">
  <h1 class="logo">Phòng của bạn</h1>
  <div class="ma-phong" id="hienMa">----</div>
  <p class="cho-doi">Đọc mã này cho người kia nhập<br><br>Đang chờ người thứ 2 <span class="cham">●</span><span class="cham">●</span><span class="cham">●</span></p>
  <div style="text-align:center;margin-top:20px;"><button class="nut nho" onclick="thoatPhong()">← Thoát</button></div>
</div>

<div class="man" id="manChoi">
  <div class="thanh-tren">
    <div class="luot" id="hienLuot">...</div>
    <button class="nut nho" onclick="thoatPhong()">Thoát</button>
  </div>
  <div class="bang" id="bang"></div>
  <p class="chu-thich" id="chuThich"></p>
  <div class="banner" id="banner" style="display:none;">
    <h2 id="bnText"></h2>
    <button class="nut do" onclick="choiLai()">Chơi ván mới</button>
  </div>
</div>

<div class="thongbao" id="thongBao"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
const FIREBASE_CONFIG = {
  apiKey:"AIzaSyCjLs6V1Y3qAkmDlEWxc0uMA7eFBvqP_yQ",
  authDomain:"game-cho-be.firebaseapp.com",
  projectId:"game-cho-be",
  storageBucket:"game-cho-be.firebasestorage.app",
  messagingSenderId:"43517948405",
  appId:"1:43517948405:web:1410e4ceecee8e915070bc"
};
firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.firestore();
const PHONG = db.collection('caro_rooms');

const N = 12, CAN = 5;       // bàn 12x12, nối 5 ô thắng
let maPhong=null, vaiTro=null, huyLangNghe=null, duLieuPhong=null, daVe=false;

const $=id=>document.getElementById(id);
function doiMan(id){document.querySelectorAll('.man').forEach(m=>m.classList.remove('hien'));$(id).classList.add('hien');}
function baoNhanh(m){const t=$('thongBao');t.textContent=m;t.classList.add('hien');clearTimeout(t._h);t._h=setTimeout(()=>t.classList.remove('hien'),2200);}
function layTen(){const t=$('oTen').value.trim().toUpperCase();if(!t){baoNhanh('Nhập tên trước nhé!');return null;}return t;}
function sinhMa(){const c='ABCDEFGHKMNPQRSTUVXYZ23456789';let m='';for(let i=0;i<4;i++)m+=c[Math.floor(Math.random()*c.length)];return m;}

async function taoPhong(){
  const ten=layTen();if(!ten)return; maPhong=sinhMa();vaiTro='host';
  try{
    await PHONG.doc(maPhong).set({
      tenHost:ten,tenGuest:null,van:1,
      bang:Array(N*N).fill(''),luot:'host',
      trangThai:'cho',nguoiThang:null,oThang:[],nuoc:-1,
      tao:firebase.firestore.FieldValue.serverTimestamp()
    });
    $('hienMa').textContent=maPhong;doiMan('manCho');langNghe();
  }catch(e){baoNhanh('Lỗi Firebase: '+e.message);}
}
async function vaoPhong(){
  const ten=layTen();if(!ten)return;
  const ma=$('oMa').value.trim().toUpperCase();
  if(ma.length!==4){baoNhanh('Mã gồm 4 ký tự!');return;}
  try{
    const doc=await PHONG.doc(ma).get();
    if(!doc.exists){baoNhanh('Không tìm thấy phòng '+ma);return;}
    if(doc.data().tenGuest){baoNhanh('Phòng đã đủ 2 người!');return;}
    maPhong=ma;vaiTro='guest';
    await PHONG.doc(ma).update({tenGuest:ten,trangThai:'choi'});
    langNghe();
  }catch(e){baoNhanh('Lỗi Firebase: '+e.message);}
}
function langNghe(){
  if(huyLangNghe)huyLangNghe();
  huyLangNghe=PHONG.doc(maPhong).onSnapshot(doc=>{
    if(!doc.exists){baoNhanh('Phòng đã đóng.');veTrangChu();return;}
    duLieuPhong=doc.data();capNhat();
  });
}
function capNhat(){
  const d=duLieuPhong;
  if(d.trangThai==='cho'){doiMan('manCho');return;}
  if(!$('manChoi').classList.contains('hien')){taoBang();doiMan('manChoi');}
  veBang();
  const kyToi = vaiTro==='host'?'Đỏ':'Xanh';
  const vien = vaiTro==='host'?'vien-do':'vien-xanh';
  $('chuThich').innerHTML = `Bạn là quân <span class="${vien}">${kyToi}</span>`;
  if(d.trangThai==='xong'){
    $('banner').style.display='block';
    $('hienLuot').textContent='Ván đã xong';$('hienLuot').classList.remove('toi');
    if(d.nguoiThang==='hoa') $('bnText').textContent='🤝 Hòa rồi!';
    else $('bnText').textContent = (d.nguoiThang===vaiTro)?'🏆 Bạn THẮNG!':'😅 Bạn thua rồi!';
  }else{
    $('banner').style.display='none';
    const luotToi=d.luot===vaiTro;
    const tenKia=vaiTro==='host'?d.tenGuest:d.tenHost;
    $('hienLuot').textContent=luotToi?'🟡 Lượt của BẠN':'⏳ Lượt của '+tenKia;
    $('hienLuot').classList.toggle('toi',luotToi);
  }
}
function taoBang(){
  const b=$('bang');b.style.gridTemplateColumns=`repeat(${N},1fr)`;b.innerHTML='';
  for(let i=0;i<N*N;i++){const o=document.createElement('div');o.className='o';o.onclick=()=>danhO(i);b.appendChild(o);}
}
function veBang(){
  const d=duLieuPhong,os=$('bang').children;
  for(let i=0;i<N*N;i++){
    const o=os[i];o.className='o';
    if(d.bang[i]==='H')o.classList.add('H');
    else if(d.bang[i]==='G')o.classList.add('G');
    if(i===d.nuoc)o.classList.add('moi');
    if(d.oThang&&d.oThang.includes(i))o.classList.add('thang');
  }
}
async function danhO(i){
  const d=duLieuPhong;
  if(!d||d.trangThai!=='choi'){return;}
  if(d.luot!==vaiTro){baoNhanh('Chưa tới lượt bạn!');return;}
  if(d.bang[i]!==''){return;}
  const ky=vaiTro==='host'?'H':'G';
  const b=d.bang.slice();b[i]=ky;
  const win=kiemTraThang(b,i,ky);
  const up={bang:b,nuoc:i,luot:vaiTro==='host'?'guest':'host'};
  if(win){up.trangThai='xong';up.nguoiThang=vaiTro;up.oThang=win;up.luot=d.luot;}
  else if(b.every(x=>x!=='')){up.trangThai='xong';up.nguoiThang='hoa';}
  try{await PHONG.doc(maPhong).update(up);}catch(e){baoNhanh('Lỗi: '+e.message);}
}
function kiemTraThang(b,idx,ky){
  const huong=[[0,1],[1,0],[1,1],[1,-1]];
  const r0=Math.floor(idx/N),c0=idx%N;
  for(const[dr,dc]of huong){
    const oList=[idx];
    for(const s of[1,-1]){
      let r=r0+dr*s,c=c0+dc*s;
      while(r>=0&&r<N&&c>=0&&c<N&&b[r*N+c]===ky){oList.push(r*N+c);r+=dr*s;c+=dc*s;}
    }
    if(oList.length>=CAN)return oList;
  }
  return null;
}
async function choiLai(){
  try{
    await PHONG.doc(maPhong).update({
      van:(duLieuPhong.van||1)+1,
      bang:Array(N*N).fill(''),luot:'host',
      trangThai:'choi',nguoiThang:null,oThang:[],nuoc:-1
    });
    baoNhanh('Ván mới bắt đầu!');
  }catch(e){baoNhanh('Lỗi: '+e.message);}
}
async function veMenu(e){
  if(e)e.preventDefault();
  if(huyLangNghe){huyLangNghe();huyLangNghe=null;}
  if(maPhong&&vaiTro==='host'){try{await PHONG.doc(maPhong).delete();}catch(err){}}
  location.href='index.html';
}
async function thoatPhong(){
  if(huyLangNghe){huyLangNghe();huyLangNghe=null;}
  if(maPhong&&vaiTro==='host'){try{await PHONG.doc(maPhong).delete();}catch(e){}}
  veTrangChu();
}
function veTrangChu(){maPhong=null;vaiTro=null;duLieuPhong=null;doiMan('manChu');}
</script>
</body>
</html>
