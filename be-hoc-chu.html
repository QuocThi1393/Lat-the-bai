<style>
  :root{
    --bg:#fff7ec;--ink:#3a3140;--soft:#fffdf9;--shadow:rgba(58,49,64,.18);
    --accent:#ff8a5b;--accent-dark:#e96a3b;
    --good:#3ec46d;--good-dark:#2da557;--bad:#ff6b6b;
    --tile:#fff;--tile-edge:#e8ddcb;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{margin:0;font-family:'Nunito',system-ui,sans-serif;color:var(--ink);
    background:radial-gradient(900px 500px at 15% -10%,#ffe6c7 0%,transparent 60%),radial-gradient(900px 500px at 110% 110%,#ffd9e6 0%,transparent 55%),var(--bg);
    overflow-x:hidden;user-select:none}
  .wrap{max-width:820px;margin:0 auto;min-height:100%;display:flex;flex-direction:column;padding:16px}

  .topbar{display:flex;align-items:center;gap:10px;margin-bottom:8px;min-height:48px}
  .topbar h1{font-family:'Fredoka',sans-serif;font-weight:700;font-size:24px;margin:0;color:var(--accent-dark);letter-spacing:.5px;flex:1}
  .iconbtn{border:none;cursor:pointer;background:var(--soft);border-radius:16px;padding:10px 14px;font-size:18px;font-weight:800;font-family:'Fredoka',sans-serif;color:var(--ink);box-shadow:0 4px 0 var(--tile-edge);transition:transform .08s,box-shadow .08s;display:inline-flex;align-items:center;gap:6px}
  .iconbtn:active{transform:translateY(3px);box-shadow:0 1px 0 var(--tile-edge)}
  .stars{background:#fff;border-radius:16px;padding:8px 14px;font-family:'Fredoka',sans-serif;font-weight:700;font-size:18px;color:#f5a623;box-shadow:0 4px 0 #f0e2c8}

  .screen{flex:1;display:flex;flex-direction:column;animation:pop .35s ease both}
  .hidden{display:none !important}
  @keyframes pop{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}

  .home-hero{text-align:center;margin:4px 0 12px}
  .home-hero .big{font-family:'Fredoka',sans-serif;font-weight:700;font-size:30px;color:var(--accent-dark);margin:0}
  .home-hero .sub{font-size:15px;color:#9a8f86;margin:4px 0 0;font-weight:700}

  /* Công tắc Cơ bản / Nâng cao */
  .leveltoggle{display:flex;align-items:center;justify-content:center;gap:12px;margin:6px 0 6px}
  .lvl-label{font-family:'Fredoka',sans-serif;font-weight:600;font-size:16px;color:var(--accent-dark);transition:color .2s}
  .lvl-label.off{color:#c9bdb0}
  .switch{position:relative;width:64px;height:34px;border:none;border-radius:20px;background:#e8ddcb;cursor:pointer;box-shadow:inset 0 2px 4px rgba(0,0,0,.12);transition:background .2s;padding:0}
  .switch.on{background:#7c5cff}
  .knob{position:absolute;top:4px;left:4px;width:26px;height:26px;border-radius:50%;background:#fff;box-shadow:0 2px 4px rgba(0,0,0,.25);transition:left .2s}
  .switch.on .knob{left:34px}
  .age-hint{text-align:center;font-size:13px;font-weight:800;color:#9b8bff;margin:0 0 10px}

  .modepick{display:flex;gap:10px;background:#fff;border-radius:22px;padding:6px;margin:8px auto 14px;box-shadow:0 4px 0 #f0e2c8;width:fit-content}
  .modebtn{border:none;cursor:pointer;background:transparent;border-radius:16px;padding:10px 18px;font-family:'Fredoka',sans-serif;font-weight:600;font-size:17px;color:#b0a59b;transition:.15s}
  .modebtn.active{background:var(--accent);color:#fff;box-shadow:0 3px 0 var(--accent-dark)}

  .theme-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:13px}
  .theme-card{border:none;cursor:pointer;border-radius:24px;padding:18px 10px;text-align:center;color:#fff;font-family:'Fredoka',sans-serif;font-weight:600;box-shadow:0 7px 0 rgba(0,0,0,.12),0 12px 22px var(--shadow);transition:transform .1s,box-shadow .1s}
  .theme-card:active{transform:translateY(5px);box-shadow:0 2px 0 rgba(0,0,0,.12)}
  .theme-card .emoji{font-size:40px;display:block;line-height:1}
  .theme-card .name{font-size:19px;display:block;margin-top:6px;text-shadow:0 2px 0 rgba(0,0,0,.12)}
  .theme-card .count{font-size:12px;font-weight:700;opacity:.92;display:block;margin-top:2px;font-family:'Nunito'}

  .flash{background:var(--soft);border-radius:32px;padding:24px 20px 22px;text-align:center;box-shadow:0 12px 30px var(--shadow);margin-top:6px;position:relative;animation:cardin .45s cubic-bezier(.2,1.2,.4,1) both}
  @keyframes cardin{from{opacity:0;transform:translateY(18px) rotate(-2deg) scale(.92)}to{opacity:1;transform:none}}
  .flash.shake{animation:shake .4s}
  @keyframes shake{0%,100%{transform:none}20%{transform:translateX(-9px)}40%{transform:translateX(9px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}

  .pic{font-size:100px;line-height:1;margin:2px 0 4px;display:inline-block;filter:drop-shadow(0 8px 10px rgba(0,0,0,.12));animation:float 3s ease-in-out infinite}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
  .vi-name{font-size:19px;font-weight:800;color:#9a8f86;margin:0 0 2px}
  .bigword{font-family:'Fredoka',sans-serif;font-weight:700;font-size:48px;letter-spacing:3px;color:var(--ink);margin:14px 0 2px;word-break:break-word}

  .speakbtn{border:none;cursor:pointer;background:#fff;border-radius:50%;width:54px;height:54px;font-size:26px;box-shadow:0 5px 0 var(--tile-edge);margin:8px 0 14px;transition:transform .08s,box-shadow .08s}
  .speakbtn:active{transform:translateY(4px);box-shadow:0 1px 0 var(--tile-edge)}

  .word{display:flex;justify-content:center;gap:5px;flex-wrap:wrap;margin-bottom:20px;font-family:'Fredoka',sans-serif;font-weight:700}
  .letter{font-size:40px;color:var(--ink);min-width:26px;text-align:center;letter-spacing:1px}
  .slot{font-size:40px;min-width:44px;height:56px;border-radius:14px;border:4px dashed var(--accent);background:#fff3ea;color:var(--accent-dark);display:inline-flex;align-items:center;justify-content:center;font-weight:700;transition:all .25s}
  .slot.filled{border-style:solid;border-color:var(--good);background:#e6f8ec;color:var(--good-dark);transform:scale(1.05)}

  .prompt{font-size:18px;font-weight:800;color:#b0a59b;margin:0 0 12px}
  .choices{display:flex;justify-content:center;gap:16px;margin-top:4px;flex-wrap:wrap}
  .tile{border:none;cursor:pointer;width:84px;height:84px;border-radius:20px;background:var(--tile);color:var(--ink);font-family:'Fredoka',sans-serif;font-weight:700;font-size:44px;box-shadow:0 7px 0 var(--tile-edge),0 10px 18px var(--shadow);transition:transform .1s,box-shadow .1s,background .2s}
  .tile:active{transform:translateY(5px);box-shadow:0 2px 0 var(--tile-edge)}
  .tile.correct{background:var(--good);color:#fff;box-shadow:0 7px 0 var(--good-dark);animation:bump .4s}
  .tile.wrong{background:var(--bad);color:#fff;box-shadow:0 7px 0 #d84a4a;animation:nope .4s}
  .tile.lock{pointer-events:none}
  .imgtile{width:96px;height:96px;font-size:52px}
  @keyframes bump{0%,100%{transform:none}40%{transform:translateY(-12px) scale(1.12)}}
  @keyframes nope{0%,100%{transform:none}25%{transform:translateX(-7px)}50%{transform:translateX(7px)}75%{transform:translateX(-4px)}}

  .feedback{text-align:center;font-family:'Fredoka',sans-serif;font-weight:700;font-size:25px;margin-top:18px;min-height:34px;color:var(--good-dark)}
  .nextbtn{display:block;margin:14px auto 0;border:none;cursor:pointer;background:var(--good);color:#fff;font-family:'Fredoka',sans-serif;font-weight:600;font-size:22px;padding:14px 34px;border-radius:22px;box-shadow:0 6px 0 var(--good-dark);transition:transform .08s,box-shadow .08s}
  .nextbtn:active{transform:translateY(4px);box-shadow:0 2px 0 var(--good-dark)}

  .progress{height:14px;background:#fff;border-radius:20px;overflow:hidden;margin:18px 4px 4px;box-shadow:inset 0 2px 4px rgba(0,0,0,.08)}
  .progress > i{display:block;height:100%;background:linear-gradient(90deg,#ffce4d,#ff9d4d);border-radius:20px;transition:width .4s;width:0}
  .progress-label{text-align:center;font-weight:800;color:#b0a59b;font-size:14px;margin-top:6px}

  .win{text-align:center;padding-top:24px;animation:pop .4s both}
  .win .trophy{font-size:108px;animation:float 2.4s ease-in-out infinite}
  .win h2{font-family:'Fredoka',sans-serif;font-size:32px;color:var(--accent-dark);margin:8px 0 0}
  .win .score{font-family:'Fredoka',sans-serif;font-size:46px;color:var(--good-dark);margin:8px 0 0}
  .win p{font-size:18px;font-weight:800;color:#9a8f86;margin:6px 0 20px}

  .confetti{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:50}
  .confetti b{position:absolute;top:-20px;width:12px;height:18px;border-radius:3px;animation:fall linear forwards}
  @keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:.9}}

  .copyright{text-align:center;font-size:12px;color:#c4b9ac;font-weight:700;padding:18px 0 8px;margin-top:auto}

  @media (max-width:430px){
    .pic{font-size:84px}.letter,.slot{font-size:32px}.slot{min-width:38px;height:48px}
    .tile{width:72px;height:72px;font-size:36px}.imgtile{width:86px;height:86px;font-size:46px}
    .bigword{font-size:38px}.theme-card .emoji{font-size:36px}.topbar h1{font-size:20px}
    .theme-grid{grid-template-columns:repeat(2,1fr)}
  }
  @media (prefers-reduced-motion:reduce){*{animation:none !important}}
</style>
</head>

    <div class="home-hero"><p class="big">Chọn cách chơi & chủ đề!</p></div>

    <div class="leveltoggle">

    <p class="age-hint hidden" id="ageHint">Dành cho bạn lớn 12–15 tuổi • Sai là qua câu mới, cuối bài tổng kết điểm</p>

    <div class="modepick">
      <button class="modebtn active" data-mode="letter">🔤 Điền chữ</button>
      <button class="modebtn" data-mode="image">🖼️ Chọn hình</button>
    </div>
    <p class="home-hero sub" id="modeDesc" style="margin:-6px 0 16px">Nhìn hình → điền chữ còn thiếu 🧩</p>

    <div class="theme-grid" id="themeGrid"></div>
  </div>

  <!-- GAME -->
  <div class="screen hidden" id="gameScreen">
    <div class="flash" id="flash">
      <div id="letterView">
        <span class="pic" id="pic">🍎</span>
        <p class="vi-name" id="viName">Quả táo</p>
      </div>
      <div id="imageView" class="hidden">
        <p class="bigword" id="bigword">APPLE</p>
      </div>

      <button class="speakbtn" id="speakBtn" title="Nghe lại">🔊</button>

      <div id="letterPlay">
        <div class="word" id="word"></div>
        <p class="prompt">Chọn chữ đúng 👇</p>
        <div class="choices" id="choices"></div>
      </div>

      <div id="imagePlay" class="hidden">
        <p class="prompt">Chọn hình đúng 👇</p>
        <div class="choices" id="imgChoices"></div>
      </div>

      <div class="feedback" id="feedback"></div>
      <button class="nextbtn hidden" id="nextBtn">Thẻ tiếp theo ➡️</button>
    </div>
    <div class="progress"><i id="bar"></i></div>
    <div class="progress-label" id="progLabel"></div>
  </div>

  <!-- WIN -->
  <div class="screen hidden" id="winScreen">
    <div class="win">
      <div class="trophy">🏆</div>
      <h2 id="winHead">Hoàn thành!</h2>
      <div class="score hidden" id="winScore"></div>
      <p id="winText">Bé giỏi quá!</p>
      <button class="nextbtn" id="playAgain" style="background:var(--accent);box-shadow:0 6px 0 var(--accent-dark)">Chơi lại 🔁</button>
      <br>
      <button class="iconbtn" id="winHome" style="margin-top:14px">🏠 Chọn chủ đề khác</button>
    </div>
  </div>

  <div class="copyright">Copyright © 2026 Nguyễn Quốc Thi.</div>
</div>
<div class="confetti hidden" id="confetti"></div>

function pickFemaleVoice(lang){
  if(!voices.length) loadVoices();
  const base=lang.split('-')[0];
  let list=voices.filter(v=>v.lang && (v.lang===lang || v.lang.replace('_','-').toLowerCase().startsWith(base)));
  if(!list.length) list=voices.slice();
  if(!list.length) return null;
  const score=v=>{const n=v.name.toLowerCase();let s=0; if(FEMALE.some(h=>n.includes(h)))s+=10; if(MALE.some(h=>n.includes(h)))s-=10; if(v.lang===lang)s+=2; if(n.includes('google'))s+=1; return s;};
  list.sort((a,b)=>score(b)-score(a));
  return list[0];
}
function speakEN(text){
  if(!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='en-US'; u.rate=0.8; u.pitch=1.25;
  const v=pickFemaleVoice('en-US'); if(v){u.voice=v;u.lang=v.lang;}
  try{window.speechSynthesis.speak(u);}catch(e){}
}

/* ===== Hiệu ứng âm thanh đúng / sai ===== */
let actx;
function audio(){ try{ if(!actx) actx=new (window.AudioContext||window.webkitAudioContext)(); if(actx.state==='suspended') actx.resume(); }catch(e){} return actx; }
function tone(freq,start,dur,type,gain){
  const a=audio(); if(!a) return;
  const o=a.createOscillator(),g=a.createGain();
  o.type=type||'sine'; o.frequency.value=freq; o.connect(g); g.connect(a.destination);
  const t=a.currentTime+start;
  g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(gain||0.2,t+0.02); g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.start(t); o.stop(t+dur+0.03);
}
function sfxCorrect(){ tone(660,0,0.15,'triangle',0.28); tone(880,0.12,0.18,'triangle',0.28); tone(1320,0.26,0.3,'triangle',0.22); }
function sfxWrong(){ tone(240,0,0.16,'square',0.16); tone(170,0.13,0.22,'square',0.16); }

/* ===== Tạo câu hỏi tự động (cho chế độ nâng cao) ===== */
const GROUPS=[['A','E','I','O','U','Y'],['B','P','D'],['C','K','G','Q'],['S','Z','X'],['M','N','W'],['F','V'],['L','R'],['T','D'],['J','G']];
function confus(letter){ const g=GROUPS.find(x=>x.includes(letter)); return g?g.filter(x=>x!==letter):[]; }
function genQuestion(word){
  const letters=word.split('');
  const idxs=letters.map((_,i)=>i).filter(i=>/[A-Z]/.test(letters[i]));
  const blank=idxs[Math.random()*idxs.length|0];
  const correct=word[blank];
  let pool=shuffle(confus(correct));
  const distract=[];
  for(const p of pool){ if(distract.length<2 && p!==correct && !distract.includes(p)) distract.push(p); }
  const ALL='ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
  while(distract.length<2){ const r=ALL[Math.random()*26|0]; if(r!==correct && !distract.includes(r)) distract.push(r); }
  return {blank, correct, choices:shuffle([correct,...distract])};
}

/* ===== Trạng thái ===== */
let level='basic', mode='letter', theme=null, order=[], idx=0, stars=0, correctCount=0, locked=false;
const $=id=>document.getElementById(id);
const DATA=()=> level==='advanced'?ADV:BASIC;

/* công tắc cấp độ */
const advToggle=$('advToggle');
advToggle.onclick=()=>{
  const on = advToggle.getAttribute('aria-checked')!=='true';
  advToggle.setAttribute('aria-checked', on?'true':'false');
  advToggle.classList.toggle('on',on);
  level = on?'advanced':'basic';
  $('lblBasic').classList.toggle('off',on);
  $('lblAdv').classList.toggle('off',!on);
  $('ageHint').classList.toggle('hidden',!on);
  document.documentElement.style.setProperty('--accent', on?'#7c5cff':'#ff8a5b');
  document.documentElement.style.setProperty('--accent-dark', on?'#5b3fd6':'#e96a3b');
  buildHome();
};

document.querySelectorAll('.modebtn').forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll('.modebtn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); mode=b.dataset.mode;
    $('modeDesc').textContent = mode==='letter' ? 'Nhìn hình → điền chữ còn thiếu 🧩' : 'Nghe & đọc chữ → chọn hình đúng 🖼️';
  };
});

function buildHome(){
  const grid=$('themeGrid'); grid.innerHTML='';
  DATA().forEach(t=>{
    const b=document.createElement('button');
    b.className='theme-card'; b.style.background=t.color;
    b.innerHTML=`<span class="emoji">${t.emoji}</span><span class="name">${t.name}</span><span class="count">${t.cards.length} thẻ</span>`;
    b.onclick=()=>startTheme(t);
    grid.appendChild(b);
  });
}
function show(s){['homeScreen','gameScreen','winScreen'].forEach(x=>$(x).classList.add('hidden'));$(s).classList.remove('hidden');$('backBtn').style.display=(s==='homeScreen')?'none':'inline-flex';}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]]}return a}

function startTheme(t){
  audio();
  theme=t; idx=0; correctCount=0;
  order=shuffle(t.cards.map((_,i)=>i));
  document.documentElement.style.setProperty('--accent',t.color);
  $('title').textContent=t.emoji+' '+t.name;
  show('gameScreen'); renderCard();
}

function renderCard(){
  locked=false;
  const card=theme.cards[order[idx]];
  $('feedback').textContent=''; $('feedback').style.color='var(--good-dark)';
  $('nextBtn').classList.add('hidden');
  $('bar').style.width=(idx/theme.cards.length*100)+'%';
  $('progLabel').textContent=`Thẻ ${idx+1} / ${theme.cards.length}`;
  if(mode==='letter') renderLetter(card); else renderImage(card);
  setTimeout(()=>speakEN(card.word),350);   // ĐỌC TIẾNG ANH khi mở thẻ
}

function renderLetter(card){
  $('letterView').classList.remove('hidden'); $('letterPlay').classList.remove('hidden');
  $('imageView').classList.add('hidden'); $('imagePlay').classList.add('hidden');
  $('pic').textContent=card.emoji; $('viName').textContent=card.vi;

  let blank, choices, correct;
  if(card.choices){ blank=card.blank; choices=card.choices; correct=card.word[blank]; }
  else { const q=genQuestion(card.word); blank=q.blank; choices=q.choices; correct=q.correct; }

  const w=$('word'); w.innerHTML='';
  card.word.split('').forEach((ch,i)=>{
    if(i===blank){ const slot=document.createElement('span'); slot.className='slot'; slot.id='slot'; slot.textContent='?'; w.appendChild(slot); }
    else{ const sp=document.createElement('span'); sp.className='letter'; sp.textContent=ch; w.appendChild(sp); }
  });

  const ch=$('choices'); ch.innerHTML='';
  shuffle(choices).forEach(letter=>{
    const t=document.createElement('button'); t.className='tile'; t.textContent=letter;
    t.onclick=()=>answer(t, letter===correct, card, correct, 'letter');
    ch.appendChild(t);
  });
}

function renderImage(card){
  $('imageView').classList.remove('hidden'); $('imagePlay').classList.remove('hidden');
  $('letterView').classList.add('hidden'); $('letterPlay').classList.add('hidden');
  $('bigword').textContent=card.word;

  const others=theme.cards.filter(c=>c.emoji!==card.emoji);
  const opts=shuffle([card,...shuffle(others).slice(0,2)]);
  const ch=$('imgChoices'); ch.innerHTML='';
  opts.forEach(opt=>{
    const t=document.createElement('button'); t.className='tile imgtile'; t.textContent=opt.emoji;
    t.onclick=()=>answer(t, opt.emoji===card.emoji, card, card.word, 'image');
    ch.appendChild(t);
  });
}

function markCorrectTile(sel, val){ document.querySelectorAll(sel+' .tile').forEach(t=>{ if(t.textContent===val) t.classList.add('correct'); }); }

function answer(btn, isCorrect, card, correct, kind){
  if(locked) return;
  if(isCorrect){
    if(kind==='letter'){ const s=$('slot'); s.textContent=correct; s.classList.add('filled'); }
    onCorrect(btn,card);
  } else {
    if(level==='advanced') onWrongAdvanced(btn,card,correct,kind);
    else onWrong(btn);
  }
}

function onCorrect(btn,card){
  locked=true;
  document.querySelectorAll('.tile').forEach(t=>t.classList.add('lock'));
  btn.classList.add('correct');
  stars++; correctCount++; $('starBox').textContent='⭐ '+stars;
  $('feedback').textContent=PRAISE[Math.random()*PRAISE.length|0];
  $('feedback').style.color='var(--good-dark)';
  sfxCorrect(); burstConfetti();
  setTimeout(()=>speakEN(card.word),120);
  $('nextBtn').classList.remove('hidden');
}

/* Cơ bản: sai thì thử lại */
function onWrong(btn){
  btn.classList.add('wrong'); $('flash').classList.add('shake');
  $('feedback').textContent=RETRY[Math.random()*RETRY.length|0]; $('feedback').style.color='var(--bad)';
  sfxWrong();
  setTimeout(()=>{ btn.classList.remove('wrong'); $('flash').classList.remove('shake'); $('feedback').textContent=''; $('feedback').style.color='var(--good-dark)'; },650);
}

/* Nâng cao: sai thì hiện đáp án rồi qua câu mới */
function onWrongAdvanced(btn,card,correct,kind){
  locked=true;
  document.querySelectorAll('.tile').forEach(t=>t.classList.add('lock'));
  btn.classList.add('wrong');
  if(kind==='letter'){ const s=$('slot'); s.textContent=correct; s.classList.add('filled'); markCorrectTile('#choices',correct); }
  else { markCorrectTile('#imgChoices',card.emoji); }
  $('feedback').textContent='Đáp án đúng: '+card.word+' 😅';
  $('feedback').style.color='var(--bad)';
  sfxWrong(); speakEN(card.word);
  setTimeout(next, 1600);
}

function next(){
  idx++;
  if(idx>=theme.cards.length){ $('bar').style.width='100%'; winScreen(); }
  else renderCard();
}

function winScreen(){
  show('winScreen'); bigConfetti();
  if(level==='advanced'){
    const total=theme.cards.length, pct=Math.round(correctCount/total*100);
    let msg = pct>=90?'Xuất sắc! 🏅' : pct>=70?'Giỏi lắm! 👍' : pct>=50?'Khá tốt, cố thêm nhé!' : 'Cố gắng thêm nha! 💪';
    $('winHead').textContent='Tổng kết';
    $('winScore').textContent=`${correctCount} / ${total}`;
    $('winScore').classList.remove('hidden');
    $('winText').textContent=`Bạn đúng ${pct}% câu — ${msg}`;
    speakEN('Well done');
  }else{
    $('winHead').textContent='Hoàn thành!';
    $('winScore').classList.add('hidden');
    $('winText').textContent=`Bé đã hoàn thành chủ đề "${theme.name}" với ${stars} ⭐!`;
    speakEN('Well done');
  }
}

function makeConfetti(n){
  const c=$('confetti'); c.classList.remove('hidden'); c.innerHTML='';
  const cols=['#ff7a7a','#ffce4d','#5fd39a','#6fc3ff','#9d8bff','#ff9d4d'];
  for(let i=0;i<n;i++){const b=document.createElement('b');b.style.left=Math.random()*100+'%';b.style.background=cols[i%cols.length];b.style.animationDuration=(1.6+Math.random()*1.4)+'s';b.style.animationDelay=(Math.random()*0.4)+'s';c.appendChild(b);}
  setTimeout(()=>{c.classList.add('hidden');c.innerHTML='';},3200);
}
const burstConfetti=()=>makeConfetti(24);
const bigConfetti=()=>makeConfetti(70);

$('nextBtn').onclick=next;
$('speakBtn').onclick=()=>{ const c=theme.cards[order[idx]]; speakEN(c.word); };
$('backBtn').onclick=()=>{ $('title').textContent='🎈 Bé Học Chữ'; show('homeScreen'); };
$('playAgain').onclick=()=>startTheme(theme);
$('winHome').onclick=()=>{ $('title').textContent='🎈 Bé Học Chữ'; show('homeScreen'); };

buildHome(); show('homeScreen');
</script>
</body>
</html>
